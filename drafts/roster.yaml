  title: 一通"健康顾问"的销售录音
  source: {type: original}
  persona: {user_role: "分析对象：保健品公司'健康顾问'与独居老人的电话录音转写（20分钟通话的节选），老人最终答应参加'免费讲座'"}
  failure_mode: 只罗列'这是诈骗话术'的批判清单——话术拆解只是及格线；这题真正的靶心是老人一方的回应模式（哪些需求让话术得以生效）
  trap: 转写稿埋线：顾问精准执行情感操控序列——开场用上次通话的细节（'阿姨您上回说膝盖疼，这几天下雨有没有好点？'=被记住的感动）、制造内群体（'我跟您说个内部消息，别人我都不告诉'）、每次老人提到子女就轻踩一脚（'儿女忙嘛，哪像我们做健康服务的天天陪着您'）、用'限额'和'专家号'制造稀缺。老人的回应逐步升温：从'我不买东西啊'到主动延长通话（'哎你先别挂'）到最后问'那个讲座……带老伴去行吗'。高分分析会命中：操控序列的技术拆解、'被记住'对孤独者的火力、话术如何系统性离间家庭信任、以及老人从防御到主动挽留的转变机制（他买的从来不是产品是关系）
